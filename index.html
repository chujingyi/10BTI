<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>10BTI · 测出你和TEN的连接符号</title>
  <meta property="og:title" content="10BTI · 测出你和TEN的连接符号">
  <meta property="og:description" content="分享给你的小伙伴本测测吧">
  <meta property="og:image" content="https://whimsical-halva-04746b.netlify.app/2.jpg">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg:       #0c071e;
      --bg2:      #160c30;
      --card:     rgba(255,255,255,0.05);
      --border:   rgba(196,132,252,0.18);
      --pl:       #c084fc;
      --p:        #a855f7;
      --pd:       #7c3aed;
      --text:     #f3e8ff;
      --sub:      #d8b4fe;
      --muted:    #8b6aaa;
    }

    html, body {
      height: 100%; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 25% 15%, rgba(139,92,246,0.22) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 85%, rgba(168,85,247,0.14) 0%, transparent 55%);
      color: var(--text);
    }

    /* ── stars ── */
    .star {
      position: fixed;
      border-radius: 50%;
      background: #fff;
      pointer-events: none;
      animation: twinkle var(--d) var(--delay) ease-in-out infinite;
    }
    @keyframes twinkle {
      0%,100% { opacity: 0; transform: scale(.5); }
      50%      { opacity: var(--op); transform: scale(1); }
    }

    /* ── pages ── */
    .page {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center;
      overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      opacity: 0; pointer-events: none;
      transition: opacity .35s ease;
      z-index: 10;
    }
    .page.active { opacity: 1; pointer-events: all; }

    /* ── shared inner ── */
    .inner {
      width: 100%; max-width: 430px;
      padding: 0 20px;
    }

    /* ──────────────────────────────────────────
       LANDING
    ────────────────────────────────────────── */
    #page-landing {
      justify-content: flex-start;
      padding-top: 52px;
    }

    .land-wrap {
      text-align: center;
      padding: 0 20px 52px;
      max-width: 430px;
      width: 100%;
    }

    /* hero image */
    .land-hero {
      position: relative;
      width: 220px; height: 220px;
      margin: 0 auto 18px;
    }
    .land-hero-img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
      box-shadow: 0 0 60px rgba(168,85,247,.35), 0 0 0 1px rgba(196,132,252,.3);
    }
    .land-hero-ring {
      position: absolute; inset: -8px;
      border-radius: 50%;
      border: 1.5px solid rgba(196,132,252,.25);
      animation: spin 12s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }

    .land-title {
      font-size: 58px; font-weight: 800;
      letter-spacing: 6px;
      background: linear-gradient(135deg, #e9d5ff 0%, #c084fc 55%, #a855f7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 2px;
    }

    .land-name-en {
      font-size: 13px; letter-spacing: 3px;
      color: var(--muted); text-transform: uppercase;
      margin-bottom: 18px;
    }

    .land-tagline {
      font-size: 16px; font-weight: 600;
      color: var(--text); line-height: 1.6;
      margin-bottom: 28px;
    }
    .land-tagline b { color: var(--pl); }
    .land-cat {
      font-size: 36px;
      text-align: center;
      margin-bottom: 6px;
      animation: float 2.8s ease-in-out infinite;
    }

    /* meta cards */
    .land-meta-row {
      display: flex; gap: 10px;
      justify-content: center; margin-bottom: 10px;
    }
    .land-meta-card {
      flex: 1; max-width: 155px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 8px;
      font-size: 12px; color: var(--sub);
      line-height: 1.7; text-align: center;
    }
    .land-meta-card .num {
      display: block; font-size: 22px; font-weight: 700;
      background: linear-gradient(135deg, #e9d5ff, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0; line-height: 1.2;
    }
    .land-meta-card .unit {
      font-size: 10px; color: var(--muted);
      letter-spacing: 1px; text-transform: uppercase;
    }

    .btn-primary {
      display: inline-block;
      background: linear-gradient(135deg, var(--pd), var(--p));
      color: #fff; border: none;
      padding: 14px 50px; border-radius: 100px;
      font-size: 16px; font-weight: 500;
      letter-spacing: 2px; cursor: pointer;
      box-shadow: 0 6px 28px rgba(168,85,247,.45);
      transition: transform .15s, box-shadow .15s;
      margin-top: 24px;
    }
    .btn-primary:active { transform: scale(.95); box-shadow: 0 3px 14px rgba(168,85,247,.3); }

    /* ── copyright ── */
    .copyright {
      width: 100%;
      text-align: center;
      font-size: 10px;
      color: rgba(139,106,170,.45);
      letter-spacing: 1.5px;
      padding: 12px 0 4px;
    }

    /* ──────────────────────────────────────────
       QUIZ
    ────────────────────────────────────────── */
    #page-quiz { justify-content: center; }

    .quiz-inner {
      width: 100%; max-width: 430px;
      padding: 24px 20px 20px;
    }

    .btn-back {
      margin-top: 14px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      padding: 6px 2px;
      letter-spacing: 0.5px;
      transition: color .15s;
    }
    .btn-back:active { color: var(--sub); }

    .prog-info {
      display: flex; justify-content: space-between;
      font-size: 11px; color: var(--muted);
      letter-spacing: 1px; margin-bottom: 8px;
    }

    .prog-track {
      height: 2px; background: rgba(255,255,255,.07);
      border-radius: 99px; overflow: hidden; margin-bottom: 24px;
    }
    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--pd), var(--pl));
      border-radius: 99px;
      transition: width .45s cubic-bezier(.4,0,.2,1);
    }

    .q-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 26px 22px 22px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .q-num {
      font-size: 10px; letter-spacing: 2px;
      color: var(--pl); text-transform: uppercase;
      margin-bottom: 6px;
    }
    .q-dim {
      font-size: 10px; letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 13px;
    }
    .q-dim em {
      font-style: normal;
      color: var(--sub);
    }

    .q-text {
      font-size: 15px; color: var(--text);
      line-height: 1.78; margin-bottom: 22px;
    }

    .opts { display: flex; flex-direction: column; gap: 9px; }

    .opt-btn {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(196,132,252,.12);
      border-radius: 13px;
      padding: 13px 15px;
      text-align: left; cursor: pointer;
      font-size: 14px; color: var(--sub);
      line-height: 1.55;
      transition: background .15s, border-color .15s;
      position: relative; overflow: hidden;
    }
    .opt-btn:active, .opt-btn.selected {
      background: rgba(168,85,247,.18);
      border-color: var(--p);
      color: var(--text);
    }
    .opt-inner { display: flex; align-items: flex-start; gap: 0; }
    .opt-lbl {
      flex-shrink: 0;
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px;
      background: rgba(168,85,247,.22);
      border-radius: 50%;
      font-size: 11px; font-weight: 700;
      color: var(--pl); margin-right: 10px;
      margin-top: 1px;
    }

    /* ──────────────────────────────────────────
       RESULT
    ────────────────────────────────────────── */
    #page-result { justify-content: flex-start; }

    .result-inner {
      width: 100%; max-width: 430px;
      padding: 44px 20px 20px;
    }

    .res-tag {
      text-align: center;
      font-size: 10px; letter-spacing: 3px;
      color: var(--muted); text-transform: uppercase;
      margin-bottom: 14px;
    }

    .res-emoji {
      text-align: center;
      font-size: 66px; margin-bottom: 10px;
      animation: float 3.2s ease-in-out infinite;
    }

    .res-name {
      text-align: center;
      font-size: 28px; font-weight: 700;
      background: linear-gradient(135deg, #e9d5ff, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 22px;
    }

    .res-desc {
      font-size: 14px; color: var(--sub);
      line-height: 1.9;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px 18px;
      margin-bottom: 22px;
    }

    /* ── 结果图片（圆形，底部） ── */
    .res-img-wrap {
      position: relative;
      width: 180px; height: 180px;
      margin: 0 auto 24px;
    }
    .res-img-ring {
      position: absolute; inset: -8px;
      border-radius: 50%;
      border: 1.5px solid rgba(196,132,252,.25);
      animation: spin 12s linear infinite;
    }
    .res-img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 20%;
      border-radius: 50%;
      display: block;
      box-shadow: 0 0 50px rgba(168,85,247,.35), 0 0 0 1px rgba(196,132,252,.3);
    }

    /* ── 雷达图 ── */
    .radar-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px 16px 18px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #radar-canvas {
      width: 100% !important;
      max-width: 300px;
      height: auto !important;
    }
    .radar-legend {
      margin-top: 14px;
      width: 100%;
      display: flex; flex-wrap: wrap;
      justify-content: center;
      gap: 6px 14px;
      font-size: 11px; line-height: 1.6;
      color: var(--sub);
    }
    .radar-legend span { white-space: nowrap; }
    .radar-legend em {
      font-style: normal; font-weight: 700;
      color: var(--pl); margin-right: 3px;
    }
    .radar-legend s {
      text-decoration: none; color: var(--muted);
    }
    .res-desc-dual-label {
      font-size: 11px; letter-spacing: 1.5px;
      color: var(--pl); margin-bottom: 10px;
    }
    .res-desc-sep {
      border: none; border-top: 1px solid rgba(196,132,252,.15);
      margin: 16px 0;
    }
    .res-desc-name2 {
      font-size: 12px; color: var(--pl);
      letter-spacing: 1px; margin-bottom: 8px;
    }

    .section-lbl {
      font-size: 10px; letter-spacing: 2.5px;
      color: var(--muted); text-transform: uppercase;
      text-align: center; margin-bottom: 14px;
    }

    /* ── dim-box (维度偏向 bar) ── */
    .dim-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px 16px 16px;
      margin-bottom: 20px;
    }
    .dim-bars { display: flex; flex-direction: column; gap: 13px; }
    .dim-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: center;
      gap: 8px;
      font-size: 11px;
    }
    .dim-left {
      text-align: right;
      color: var(--sub);
      white-space: nowrap;
      display: flex; align-items: center;
      justify-content: flex-end; gap: 3px;
    }
    .dim-left em {
      font-style: normal; font-weight: 700;
      color: var(--pl); font-size: 11px;
    }
    .dim-right {
      text-align: left;
      color: var(--sub);
      white-space: nowrap;
      display: flex; align-items: center;
      justify-content: flex-start; gap: 3px;
    }
    .dim-right em {
      font-style: normal; font-weight: 700;
      color: var(--pl); font-size: 11px;
    }
    .dim-track {
      position: relative;
      height: 8px;
      background: rgba(255,255,255,.06);
      border-radius: 99px;
      overflow: hidden;
    }
    .dim-fill {
      position: absolute;
      top: 0; height: 100%;
      border-radius: 99px;
      transition: width 1s cubic-bezier(.4,0,.2,1), left 1s cubic-bezier(.4,0,.2,1);
    }
    .dim-fill.left-bias {
      background: linear-gradient(to left, var(--pd), var(--pl));
    }
    .dim-fill.right-bias {
      background: linear-gradient(to right, rgba(168,85,247,.6), rgba(99,102,241,.7));
    }
    .dim-track::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      left: 50%; width: 1px;
      background: rgba(255,255,255,.15);
    }

    .match-list {
      display: flex; flex-direction: column; gap: 9px;
      margin-bottom: 28px;
    }
    .match-item {
      display: flex; align-items: center; gap: 9px;
      font-size: 13px;
    }
    .match-name {
      width: 118px; flex-shrink: 0;
      color: var(--sub); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .match-item.top .match-name { color: var(--pl); font-weight: 600; }
    .match-track {
      flex: 1; height: 5px;
      background: rgba(255,255,255,.06);
      border-radius: 99px; overflow: hidden;
    }
    .match-fill {
      height: 100%; border-radius: 99px;
      transition: width 1.1s cubic-bezier(.4,0,.2,1);
    }
    .match-item.top .match-fill {
      background: linear-gradient(90deg, var(--pd), var(--pl));
    }
    .match-item:not(.top) .match-fill {
      background: rgba(168,85,247,.35);
    }
    .match-pct {
      width: 42px; text-align: right;
      font-size: 12px; color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .actions {
      display: flex; gap: 12px;
    }
    .btn-ghost {
      flex: 1; background: transparent;
      border: 1px solid rgba(196,132,252,.28);
      color: var(--sub); padding: 13px;
      border-radius: 100px; font-size: 14px;
      cursor: pointer; transition: background .15s;
    }
    .btn-ghost:active { background: rgba(168,85,247,.1); }

    .btn-fill {
      flex: 1;
      background: linear-gradient(135deg, var(--pd), var(--p));
      border: none; color: #fff;
      padding: 13px; border-radius: 100px;
      font-size: 14px; cursor: pointer;
      box-shadow: 0 4px 18px rgba(168,85,247,.38);
      transition: transform .15s;
    }
    .btn-fill:active { transform: scale(.96); }

    /* ── 分享面板 ── */
    .share-panel {
      position: fixed; inset: 0;
      background: rgba(12,7,30,.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      display: flex; align-items: flex-end;
      justify-content: center;
    }
    .share-panel-inner {
      background: rgba(22,12,48,.98);
      border: 1px solid rgba(196,132,252,.25);
      border-radius: 24px 24px 0 0;
      padding: 28px 24px 40px;
      width: 100%; max-width: 430px;
      display: flex; flex-direction: column;
      gap: 10px;
    }
    .share-title {
      text-align: center;
      font-size: 11px; letter-spacing: 2px;
      color: var(--muted); text-transform: uppercase;
      margin-bottom: 6px;
    }
    .share-btn {
      width: 100%;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(196,132,252,.18);
      border-radius: 14px;
      padding: 15px 18px;
      color: var(--text);
      font-size: 15px;
      cursor: pointer;
      display: flex; align-items: center;
      gap: 10px;
      transition: background .15s, border-color .15s;
    }
    .share-btn:active {
      background: rgba(168,85,247,.15);
      border-color: var(--p);
    }
    .share-btn-icon {
      font-size: 20px;
    }
    .share-panel-close {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      padding: 10px;
      text-align: center;
      margin-top: 4px;
    }
    .share-panel-close:active { color: var(--sub); }

    /* ── toast ── */
    .toast {
      position: fixed; bottom: 72px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: rgba(124,58,237,.92);
      color: #fff; padding: 10px 22px;
      border-radius: 100px; font-size: 13px;
      opacity: 0; transition: all .3s;
      pointer-events: none; z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── 预览弹窗 ── */
    .preview-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.88);
      z-index: 200;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .preview-overlay img {
      max-width: 100%;
      max-height: 78vh;
      border-radius: 12px;
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
      user-select: none;
      -webkit-user-select: none;
      pointer-events: auto;
    }
    .preview-hint {
      color: rgba(255,255,255,.55);
      font-size: 12px;
      margin-top: 14px;
      letter-spacing: 1px;
    }
    .preview-close {
      position: absolute;
      top: 16px; left: 16px;
      background: rgba(255,255,255,.12);
      border: none; color: #fff;
      width: 36px; height: 36px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .preview-close:active { background: rgba(255,255,255,.25); }

    /* ── 语言选择器 ── */
    .lang-sel {
      position: fixed; top: 16px; right: 16px; z-index: 9999;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(196,132,252,.25);
      color: #d8b4fe; font-size: 12px; font-weight: 600;
      padding: 5px 8px; border-radius: 20px;
      cursor: pointer;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      outline: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .lang-sel option { background: #160c30; color: #f3e8ff; }

    /* ── 留言框 ── */
    .comment-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px 16px 16px;
      margin-top: 28px;
      margin-bottom: 20px;
    }
    .comment-box-title {
      font-size: 10px; letter-spacing: 2.5px;
      color: var(--muted); text-transform: uppercase;
      text-align: center; margin-bottom: 12px;
    }
    .comment-textarea {
      width: 100%;
      min-height: 80px;
      max-height: 200px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(196,132,252,.15);
      border-radius: 12px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      font-family: inherit;
      transition: border-color .2s;
    }
    .comment-textarea::placeholder { color: var(--muted); }
    .comment-textarea:focus { border-color: rgba(168,85,247,.45); }
    .comment-submit-row {
      display: flex; justify-content: flex-end;
      margin-top: 10px; gap: 10px;
    }
    .btn-comment {
      background: linear-gradient(135deg, var(--pd), var(--p));
      border: none; color: #fff;
      padding: 10px 24px; border-radius: 100px;
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(168,85,247,.35);
      transition: transform .15s;
    }
    .btn-comment:active { transform: scale(.95); }
    .btn-comment:disabled {
      opacity: .45;
      pointer-events: none;
    }
    .comment-char-count {
      font-size: 11px;
      color: var(--muted);
      align-self: center;
      flex: 1;
      text-align: left;
    }

    /* ── 历史 & 统计 按钮行 ── */
    .extra-actions {
      display: flex;
      gap: 10px;
      margin-top: 28px;
      margin-bottom: 0;
    }
    .btn-extra {
      flex: 1;
      padding: 11px 8px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: transform .15s, background .2s;
      border: 1px solid rgba(196,132,252,.3);
      background: rgba(196,132,252,.08);
      color: var(--sub);
      text-align: center;
    }
    .btn-extra:active { transform: scale(.95); }
    .btn-extra.active {
      background: rgba(196,132,252,.18);
      border-color: rgba(196,132,252,.5);
      color: #e9d5ff;
    }

    const decoded = JSON.parse(atob(answers));

})();

   QUIZ
══════════════════════════════════════════════ */
function renderQ() {
  const q = Q[cur];
  const pct = Math.round(cur / Q.length * 100);
  const l = _lang; // 当前语言

  document.getElementById('q-num').textContent   = 'Q' + String(cur + 1).padStart(2, '0');
  document.getElementById('q-dim').innerHTML      = q['d_' + l];
  document.getElementById('prog-label').textContent = (cur + 1) + ' / ' + Q.length;
  document.getElementById('prog-pct').textContent   = pct + '%';
  document.getElementById('prog-fill').style.width  = pct + '%';
  document.getElementById('q-text').textContent     = q['t_' + l];

  document.getElementById('btn-back').style.display = cur > 0 ? 'block' : 'none';

  const container = document.getElementById('opts');
  container.innerHTML = '';
  q.o.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    if (ans[cur] === i) btn.classList.add('selected');
    btn.innerHTML = '<div class="opt-inner"><span class="opt-lbl">' + LABELS[i] + '</span><span>' + opt['t_' + l] + '</span></div>';
    btn.onclick = () => pick(i);
    container.appendChild(btn);
  });
}

function pick(i) {
  document.querySelectorAll('.opt-btn').forEach(b => b.style.pointerEvents = 'none');
  document.querySelectorAll('.opt-btn')[i].classList.add('selected');
  ans[cur] = i;
  setTimeout(() => {
    cur++;
    if (cur < Q.length) renderQ();
    else showResult();
  }, 320);
}

function goBack() {
  if (cur <= 0) return;
  cur--;
  renderQ();
}

/* ══════════════════════════════════════════════
   ALGORITHM
══════════════════════════════════════════════ */
function calcProfile() {
  const p = [0,0,0,0,0,0];
  ans.forEach((ai, qi) => Q[qi].o[ai].s.forEach((v, k) => p[k] += v));
  return p.map((v, k) => {
    let s = v / Q.length + OFFSET[k];       // 中心校正
    s = 3 + (s - 3) * SCALE;                // 放大偏差
    return Math.max(1, Math.min(5, s));      // 钳位到1-5
  });
}

function calcMatches(profile) {
  return RESULTS.map((r, ri) => {
    const sqDist = r.p.reduce((s, v, k) => s + W[k] * Math.pow(profile[k] - v, 2), 0);
    const dist   = Math.sqrt(sqDist);
    const match = Math.round((100 - dist / K * 100) * 100) / 100;
    return { i: ri, m: Math.max(0, match) };
  });
}

/* ══════════════════════════════════════════════
   RESULT
══════════════════════════════════════════════ */
function showResult() {
  const profile = calcProfile();
  const matches = calcMatches(profile);
  const sorted  = [...matches].sort((a, b) => b.m - a.m);
  const l = _lang;

  const top = RESULTS[sorted[0].i];
  const isDual = sorted[0].m === sorted[1].m;

  // 存储分享数据
  _shareData = { top, profile, matches, isDual, sorted };

  /* header — emoji 用 innerHTML 解析 HTML 实体 */
  document.getElementById('res-emoji').innerHTML = top.e;
  document.getElementById('res-name').textContent  = top['n_' + l] || top.n;

  /* 结果图片 */
  const imgEl = document.getElementById('res-img');
  imgEl.src = top.img;
  imgEl.alt = top['n_' + l] || top.n;

  /* description */
  const descEl = document.getElementById('res-desc');
  if (isDual) {
    const sec = RESULTS[sorted[1].i];
    descEl.innerHTML =
      '<div class="res-desc-dual-label">' + t('toast_dual') + '</div>' +
      '<div>' + (top['d_' + l] || top.d_zh) + '</div><hr class="res-desc-sep">' +
      '<div class="res-desc-name2">' + sec.e.replace(/&#x([0-9a-f]+);/gi, function(_, h){return String.fromCodePoint(parseInt(h,16));}) + ' ' + (sec['n_' + l] || sec.n) + '</div>' +
      '<div>' + (sec['d_' + l] || sec.d_zh) + '</div>';
  } else {
    descEl.textContent = top['d_' + l] || top.d_zh;
  }

  show('page-result');
  setTimeout(() => {
    drawRadarProfile(profile);
    drawDimBars(profile);
  }, 120);

  // 埋点：答题完成
  track('quiz_complete', {
    resultKey: top.n,
    matchPct: sorted[0].m,
    profile: profile.map(v => Math.round(v * 10) / 10)
  });
}

function getAxisLabels() {
  return [
    ['IO', t('dim_IO'), t('dim_IO_L'), t('dim_IO_R')],
    ['CD', t('dim_CD'), t('dim_CD_L'), t('dim_CD_R')],
    ['LP', t('dim_LP'), t('dim_LP_L'), t('dim_LP_R')],
    ['IA', t('dim_IA'), t('dim_IA_L'), t('dim_IA_R')],
    ['PS', t('dim_PS'), t('dim_PS_L'), t('dim_PS_R')],
    ['PO', t('dim_PO'), t('dim_PO_L'), t('dim_PO_R')]
  ];
}
// 向后兼容
const AXIS_LABELS = getAxisLabels();

let radarChart = null;

function drawRadarProfile(profile, canvasId, legendId) {
  canvasId  = canvasId  || 'radar-canvas';
  legendId  = legendId  || 'radar-legend';
  const axLabels = getAxisLabels();

  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  // 1-5量表转换为0-100显示：score * 20
  const data   = axLabels.map((_, i) => Math.round(profile[i] * 20));
  const labelStrs = axLabels.map(ax => [ax[0], ax[1]]);

  const instanceId = canvasId === 'radar-canvas' ? 'radarChart' : 'scRadarChart';
  if (window[instanceId]) { window[instanceId].destroy(); window[instanceId] = null; }

  window[instanceId] = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: labelStrs,
      datasets: [{
        data,
        backgroundColor: 'rgba(168,85,247,0.15)',
        borderColor: 'rgba(192,132,252,0.9)',
        borderWidth: 1.5,
        pointBackgroundColor: 'rgba(192,132,252,0.85)',
        pointBorderColor: 'transparent',
        pointRadius: 4,
        pointHoverRadius: 6,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      scales: {
        r: {
          min: 0, max: 100,
          ticks: { display: false, stepSize: 25 },
          grid: { color: 'rgba(196,132,252,0.12)' },
          angleLines: { color: 'rgba(196,132,252,0.18)' },
          pointLabels: {
            color: '#d8b4fe',
            font: { size: 10, weight: '600' },
            padding: 8,
          }
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ' ' + ctx.raw
          }
        }
      }
    }
  });

  const legendEl = document.getElementById(legendId);
  if (legendEl) {
    legendEl.innerHTML = axLabels.map(ax =>
      '<span><em>' + ax[0] + '</em>' + ax[1] + ' <s>' + ax[2] + ' / ' + ax[3] + '</s></span>'
    ).join('');
  }
}

const BAR_COLORS_LEFT  = [
  'linear-gradient(to left, #7c3aed, #c084fc)',
  'linear-gradient(to left, #6d28d9, #a78bfa)',
  'linear-gradient(to left, #5b21b6, #c084fc)',
  'linear-gradient(to left, #7c3aed, #818cf8)',
  'linear-gradient(to left, #6d28d9, #c084fc)',
  'linear-gradient(to left, #7c3aed, #a78bfa)',
];
const BAR_COLORS_RIGHT = [
  'linear-gradient(to right, rgba(99,102,241,.7), rgba(168,85,247,.4))',
  'linear-gradient(to right, rgba(79,70,229,.7), rgba(139,92,246,.4))',
  'linear-gradient(to right, rgba(91,33,182,.7), rgba(168,85,247,.4))',
  'linear-gradient(to right, rgba(99,102,241,.7), rgba(129,140,248,.4))',
  'linear-gradient(to right, rgba(79,70,229,.7), rgba(192,132,252,.4))',
  'linear-gradient(to right, rgba(99,102,241,.7), rgba(167,139,250,.4))',
];

function drawDimBars(profile) {
  const container = document.getElementById('dim-bars');
  container.innerHTML = '';
  const axLabels = getAxisLabels();

  // 1-5量表，3为中点，score < 3 偏向左边，score > 3 偏向右边
  axLabels.forEach((ax, i) => {
    const score = profile[i];
    const deviation = Math.abs(score - 3);
    const fillPct = deviation / 2 * 50; // 最大偏离(2)时填充50%
    const leftWins = score < 3;
    const code = ax[0];
    const lCode = code[0];
    const rCode = code[1] || code[0];

    const row = document.createElement('div');
    row.className = 'dim-row';
    row.innerHTML =
      '<div class="dim-left">' + ax[2] + '<em>' + lCode + '</em></div>' +
      '<div class="dim-track" id="dtrack' + i + '">' +
        '<div class="dim-fill ' + (leftWins ? 'left-bias' : 'right-bias') + '" id="dfill' + i + '"' +
          ' style="width:0%; ' + (leftWins ? 'right:50%' : 'left:50%') + '; background:' + (leftWins ? BAR_COLORS_LEFT[i] : BAR_COLORS_RIGHT[i]) + '">' +
        '</div>' +
      '</div>' +
      '<div class="dim-right"><em>' + rCode + '</em>' + ax[3] + '</div>';
    container.appendChild(row);
  });

  requestAnimationFrame(() => {
    AXIS_LABELS.forEach((_, i) => {
      const score = profile[i];
      const deviation = Math.abs(score - 3);
      const fillPct = deviation / 2 * 50;
      const fillEl   = document.getElementById('dfill' + i);
      if (fillEl) fillEl.style.width = fillPct + '%';
    });
  });
}

  const panel = document.getElementById('share-panel');
  if (panel && panel.style.display !== 'none' && e.target === panel) {
    closeSharePanel();
  }
});

function generateShareLink() {
  // encodeURIComponent 把 base64 里的 + / = 全部 percent-encode，
  // 防止 URL 解析时 + 被当成空格导致 atob 失败
  const encoded = encodeURIComponent(btoa(JSON.stringify(ans)));
  // 始终取不含参数的纯净路径，确保二维码落首页
  const base = window.location.origin + window.location.pathname;
  return base + '?a=' + encoded;
}

function copyShareLink() {
  const link = generateShareLink();
  closeSharePanel();
  if (navigator.clipboard) {
    navigator.clipboard.writeText(link)
      .then(() => toast(t('toast_copy')))
      .catch(() => toast(t('toast_copy_fail')));
  } else {
    prompt(_lang === 'en' ? 'Copy this link:' : '\u590d\u5236\u6b64\u94fe\u63a5:', link);
  }
}

async function generateShareImg() {
  if (!_shareData) { toast(_lang === 'en' ? 'Please complete the quiz first' : '请先完成测试'); return; }
  const { top, profile } = _shareData;
  closeSharePanel();
  toast(t('toast_gen'));

  try {
    const W = 390; // 分享卡片宽度

    /* ── Step 1: 把结果图片预转成 data URL，彻底规避 html2canvas 的 CORS 问题 ── */
    function imgToDataURL(src) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          try {
            const c = document.createElement('canvas');
            c.width = img.naturalWidth; c.height = img.naturalHeight;
            c.getContext('2d').drawImage(img, 0, 0);
            resolve(c.toDataURL('image/jpeg', 0.9));
          } catch(e) { resolve(src); }
        };
        img.onerror = () => resolve(src);
        img.src = src;
      });
    }

    const radarEl  = document.getElementById('radar-canvas');
    const [resultDataURL] = await Promise.all([imgToDataURL(top.img)]);
    const radarDataURL    = radarEl ? radarEl.toDataURL('image/png') : null;

    /* ── Step 2: 生成二维码并拿到 data URL ── */
    const qrHolder = document.createElement('div');
    qrHolder.style.cssText = 'position:fixed;top:-9999px;left:-9999px;visibility:hidden;';
    document.body.appendChild(qrHolder);
    new QRCode(qrHolder, {
      text: generateShareLink(), width: 100, height: 100,
      colorDark: '#4c1d95', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
    await new Promise(res => {
      const chk = () => {
        if (qrHolder.querySelector('canvas,img')) { res(); return; }
        setTimeout(chk, 50);
      };
      chk();
    });
    const qrNode    = qrHolder.querySelector('canvas') || qrHolder.querySelector('img');
    const qrDataURL = qrNode ? (qrNode.toDataURL ? qrNode.toDataURL() : qrNode.src) : null;
    document.body.removeChild(qrHolder);

    /* ── Step 3: 构建截图容器（所有图片均用 data URL，html2canvas 无需跨域） ── */
    const container = document.createElement('div');
    // position:absolute + left 偏移，避免 position:fixed 的渲染问题
    container.style.cssText = `
      position: absolute; top: 0; left: -${W + 20}px;
      width: ${W}px;
      background: linear-gradient(180deg, #0c071e 0%, #160c30 100%);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #f3e8ff;
    `;

    function mk(tag, css, text) {
      const e = document.createElement(tag);
      if (css)  e.style.cssText = css;
      if (text !== undefined) e.textContent = text;
      return e;
    }
    function card(extra) {
      return mk('div', `
        margin: 0 16px 14px; padding: 16px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(196,132,252,0.18);
        border-radius: 18px; ${extra || ''}
      `);
    }

    // 顶部标签
    container.appendChild(mk('div', `
      text-align:center; padding: 32px 0 0;
      font-size: 10px; letter-spacing: 3px;
      color: rgba(139,106,170,0.8);
    `, t('snap_tagline')));

    // emoji
    const emojiText = top.e.replace(/&#x([0-9a-f]+);/gi,
      (_, h) => String.fromCodePoint(parseInt(h, 16)));
    container.appendChild(mk('div', `
      text-align: center; font-size: 60px; line-height: 1.3;
      padding: 12px 0 6px;
    `, emojiText));

    // 名称（html2canvas 不支持 background-clip:text，用纯色代替）
    container.appendChild(mk('div', `
      text-align: center; font-size: 24px; font-weight: 700;
      color: #c084fc; padding-bottom: 16px;
    `, top['n_' + _lang] || top.n));

    // 描述卡
    const dc = card();
    dc.appendChild(mk('div', `
      font-size: 13px; color: rgba(216,180,254,0.85); line-height: 1.9;
    `, top['d_' + _lang] || top.d_zh));
    container.appendChild(dc);

    // 雷达图卡
    if (radarDataURL) {
      const rc = card('text-align:center;');
      rc.appendChild(mk('div', `
        font-size:10px; letter-spacing:2.5px; color:rgba(139,106,170,0.8);
        margin-bottom:10px;
      `, t('snap_radar')));
      const ri = mk('img');
      ri.src = radarDataURL;
      ri.style.cssText = 'width:100%; max-width:260px; height:auto; display:block; margin:0 auto;';
      rc.appendChild(ri);
      container.appendChild(rc);
    }

    // 维度偏向卡
    const dimc = card();
    dimc.appendChild(mk('div', `
      font-size:10px; letter-spacing:2.5px; color:rgba(139,106,170,0.8);
      text-align:center; margin-bottom:12px;
    `, t('snap_dim')));
    const snapAxLabels = getAxisLabels();
    snapAxLabels.forEach((ax, i) => {
      const score  = profile[i];
      const dev    = Math.abs(score - 3);
      const fillPct = (dev / 2) * 50; // 0-50%
      const isLeft = score < 3;
      const row = mk('div', 'display:flex; align-items:center; margin-bottom:8px; font-size:11px;');
      row.appendChild(mk('span', 'flex:1; text-align:right; color:rgba(216,180,254,0.82); padding-right:6px; white-space:nowrap;', ax[2]));
      const track = mk('div', 'flex:0 0 130px; height:7px; background:rgba(255,255,255,0.07); border-radius:4px; position:relative;');
      // 中心线
      track.appendChild(mk('div', 'position:absolute; top:0; left:50%; width:1px; height:100%; background:rgba(255,255,255,0.2);'));
      // 填充条
      const fillColor = isLeft ? '#a855f7' : '#6366f1';
      const fillSide  = isLeft ? 'right' : 'left';
      track.appendChild(mk('div', `
        position:absolute; top:0; ${fillSide}:50%;
        width:${fillPct / 2}%; height:100%;
        background:${fillColor}; border-radius:4px;
      `));
      row.appendChild(track);
      row.appendChild(mk('span', 'flex:1; text-align:left; color:rgba(216,180,254,0.82); padding-left:6px; white-space:nowrap;', ax[3]));
      dimc.appendChild(row);
    });
    container.appendChild(dimc);

    // 结果圆形图片（用 background 实现圆形，避免 object-fit 截图异常）
    if (resultDataURL) {
      const iw = mk('div', 'text-align:center; margin: 4px 0 18px;');
      const ri = mk('div');
      ri.style.cssText = `
        width:130px; height:130px; border-radius:50%;
        background-image:url(${resultDataURL});
        background-size:cover; background-position:center 20%;
        background-repeat:no-repeat;
        border:1.5px solid rgba(196,132,252,0.4);
        box-shadow:0 0 32px rgba(168,85,247,0.3), 0 0 0 7px rgba(196,132,252,0.07);
        display:inline-block;
      `;
      iw.appendChild(ri);
      container.appendChild(iw);
    }

    // footer（声明靠左，二维码靠右）
    const footer = mk('div', 'background:#fff; display:flex; align-items:center; justify-content:space-between; padding:14px 18px 16px;');
    const footerText = mk('div', 'flex:1; padding-right:12px;');
    footerText.appendChild(mk('div', 'color:#7c3aed; font-size:11px; font-weight:600; margin-bottom:3px;',
      t('footer_line1')));
    footerText.appendChild(mk('div', 'color:#999; font-size:9px; margin-bottom:2px;',
      t('footer_line2')));
    footerText.appendChild(mk('div', 'color:#bbb; font-size:8px;',
      'all rights reserved by HiTOMi'));
    footer.appendChild(footerText);
    if (qrDataURL) {
      const qi = mk('img');
      qi.src = qrDataURL;
      qi.style.cssText = 'width:70px; height:70px; flex-shrink:0;';
      footer.appendChild(qi);
    }
    container.appendChild(footer);

    // 暂时允许 body overflow，让 absolute 定位元素可以完整布局
    const prevOverflow = document.body.style.overflow;
    document.body.style.overflow = 'visible';
    document.body.appendChild(container);

    /* ── Step 4: 等待容器内所有图片加载完毕 ── */
    const allImgs = Array.from(container.querySelectorAll('img'));
    await Promise.all(allImgs.map(img => new Promise(res => {
      if (img.complete && img.naturalHeight > 0) { res(); return; }
      img.onload = res; img.onerror = res;
    })));
    await new Promise(r => setTimeout(r, 200));

    /* ── Step 5: html2canvas 截图 ── */
    // useCORS:false + allowTaint:false：所有图片均已是 data URL，无跨域，canvas 不会被污染
    const snap = await html2canvas(container, {
      scale: 2,
      useCORS: false,
      allowTaint: false,
      backgroundColor: '#0c071e',
      logging: false,
    });

    document.body.removeChild(container);
    document.body.style.overflow = prevOverflow;

    const dataUrl = snap.toDataURL('image/png');
    document.getElementById('preview-img').src = dataUrl;
    document.getElementById('preview-overlay').style.display = 'flex';

  } catch (err) {
    toast(t('toast_gen_fail'));
    console.error('generateShareImg failed:', err);
  }
}

// 辅助：圆角矩形路径
function roundRect(ctx, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// 辅助：文字换行
function wrapText(text, maxW, fontSize) {
  const lines = [];
  let line = '';
  for (const ch of text) {
    const test = line + ch;
    // 简单估算：中文字符宽度约等于 fontSize
    const estW = [...test].reduce((s, c) => s + (c.charCodeAt(0) > 127 ? fontSize : fontSize * 0.55), 0);
    if (estW > maxW && line) {
      lines.push(line);
      line = ch;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

  '练习室凌晨三点': { zh: '练习室凌晨三点', en: '3AM in the Practice Room', ko: '새벽 3시 연습실', th: '03:00 ในห้องซ้อม', e: '🪞' },
  'Paint Me Naked':  { zh: 'Paint Me Naked',  en: 'Paint Me Naked',           ko: 'Paint Me Naked',   th: 'Paint Me Naked',        e: '💌' },
  '第四只 L':        { zh: '第四只 L',         en: 'The Fourth L',             ko: '네 번째 L',         th: 'L ตัวที่สี่',           e: '🐱' },
  '蜡烛灯前':        { zh: '蜡烛灯前',         en: 'Before the Candle',        ko: '촛불 앞에서',        th: 'เทียนเล่มเล็ก',         e: '🕯️' },
  '未干的颜料':      { zh: '未干的颜料',       en: 'Wet Paint',                ko: '마르지 않은 물감',   th: 'สีที่ยังเปียก',          e: '🎨' },
  '第七个电话':      { zh: '第七个电话',       en: 'The Seventh Call',         ko: '일곱 번째 전화',     th: 'สายโทรศัพท์สายที่เจ็ด', e: '📞' },
};

function toggleHistory() {
  var panel = document.getElementById('history-panel');
  var btn   = document.getElementById('btn-history');
  var isOpen = panel.classList.contains('open');

  if (isOpen) {
    panel.classList.remove('open');
    btn.classList.remove('active');
  } else {
    panel.classList.add('open');
    btn.classList.add('active');
    if (!_historyLoaded) loadHistory();
  }
}

function loadHistory() {
  _historyLoaded = true;
  var ua = encodeURIComponent(navigator.userAgent);
  var url = _SB_URL + '?event=eq.quiz_complete&ua=eq.' + ua
          + '&select=result_key,created_at&order=created_at.desc&limit=50';

  fetch(url, {
    headers: { 'apikey': _SB_KEY, 'Authorization': 'Bearer ' + _SB_KEY }
  })
  .then(function(r) { return r.json(); })
  .then(function(rows) {
    document.getElementById('history-loading').style.display = 'none';
    if (!rows || rows.length === 0) {
      document.getElementById('history-empty').style.display = 'block';
      return;
    }
    _historyRows = rows;
    renderHistoryRows();
    document.getElementById('history-table').style.display = 'table';
  })
  .catch(function() {
    document.getElementById('history-loading').textContent = t('history_loading') + ' ✕';
  });
}

function renderHistoryRows() {
  if (!_historyRows) return;
  var tbody = document.getElementById('history-tbody');
  if (!tbody) return;
  tbody.innerHTML = '';
  _historyRows.forEach(function(row) {
    var dt = row.created_at ? row.created_at.slice(0, 10) : '-';
    var tm = row.created_at ? row.created_at.slice(11, 16) : '';
    var rk = row.result_key || '-';
    var info = _RESULT_NAMES[rk];
    var label = info ? (info.e + ' ' + (info[_lang] || info.zh)) : rk;
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td class="td-time">' + dt + ' ' + tm + '</td>' +
      '<td class="td-result">' + label + '</td>';
    tbody.appendChild(tr);
  });
}

function openDashboard() {
  var base = window.location.href.split('?')[0];
  var dir  = base.substring(0, base.lastIndexOf('/') + 1);
  window.open(dir + 'dashboard.html', '_blank');
}

function submitComment() {
  var ta = document.getElementById('comment-textarea');
  var btn = document.getElementById('comment-submit');
  var msg = ta.value.trim();
  if (!msg) { toast(t('toast_comment_empty')); return; }

  btn.disabled = true;
  var resultKey = _shareData ? _shareData.top.n : null;

  fetch(_SB_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': _SB_KEY,
      'Authorization': 'Bearer ' + _SB_KEY,
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify({
      event: 'comment',
      result_key: resultKey,
      lang: _lang,
      message: msg,
      ua: navigator.userAgent,
      ref: document.referrer || null
    }),
    keepalive: true
  }).then(function() {
    toast(t('toast_comment_ok'));
    ta.value = '';
    document.getElementById('comment-char-count').textContent = '0 / 500';
  }).catch(function() {
    toast(t('toast_comment_fail'));
  }).finally(function() {
    btn.disabled = false;
  });
}
</script>
